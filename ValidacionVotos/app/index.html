<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesa Electoral - Presidente</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; background: #f4f4f4; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .btn-container { margin-top: 20px; display: flex; justify-content: space-around; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-hab { background: #2e7d32; color: white; }
        .btn-bloq { background: #c62828; color: white; }
        .hidden { display: none; }
        .status { color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>Panel del Presidente de mesa</h2>
    <div id="esperando">
        <p class="status">Esperando escaneo de DNI...</p>
    </div>

    <div id="datos-votante" class="hidden">
        <hr>
        <h3>Votante Detectado</h3>
        <p><strong>Nombre:</strong> <span id="nom"></span></p>
        <p><strong>DNI:</strong> <span id="dni"></span></p>

        <!-- NUEVO: Alerta de antecedentes -->
        <div id="alerta-penal" class="hidden" style="background: #ffebee; color: #c62828; padding: 10px; border-radius: 5px; margin: 10px 0; border: 1px solid #c62828;">
            ⚠️ <strong>ATENCIÓN:</strong> El ciudadano posee antecedentes penales registrados.
        </div>

        <div class="btn-container">
            <button class="btn-hab" onclick="decidir(true)">HABILITAR</button>
            <button class="btn-bloq" onclick="decidir(false)">BLOQUEAR</button>
        </div>
    </div>
</div>

<script>
    // Conectamos al backend que ya tenés corriendo
    const socket = io('http://44.196.23.48:3000');
    let dniActual = "";

    // Escuchamos cuando el backend avisa que alguien escaneó su DNI
    socket.on('elector_detectado', (elector) => {
        dniActual = elector.dni;
        document.getElementById('nom').innerText = elector.nombre + " " + elector.apellido;
        document.getElementById('dni').innerText = elector.dni;
        
        // Lógica de antecedentes
        const alerta = document.getElementById('alerta-penal');
        if (elector.antecedentes) {
            alerta.classList.remove('hidden');
        } else {
            alerta.classList.add('hidden');
        }

        document.getElementById('esperando').classList.add('hidden');
        document.getElementById('datos-votante').classList.remove('hidden');
    });

    function decidir(autorizado) {
        const decision = autorizado ? 'aprobado' : 'rechazado';

        socket.emit('decision_presidente', {
            dni: dniActual,
            decision: decision
        });

        alert("Acción enviada: " + decision);
        document.getElementById('datos-votante').classList.add('hidden');
        document.getElementById('esperando').classList.remove('hidden');
    }
</script>

</body>
</html>
